title: Jiwon Jeong
description: AI Research Engineer — NLP, LLM Reasoning
url: https://jw9603.github.io
author:
  name: Jiwon Jeong
  email: jwjw9603@gmail.com

lang: en

# Posts use /blog/:title/, the notes collection uses /notes/:path/
permalink: /blog/:title/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
  hard_wrap: false

# Don't use the default Jekyll theme; we have our own CSS
theme: null

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: note
      lang: ko
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      lang: ko

plugins:
  - jekyll-sitemap

# Don't process these files/dirs as Jekyll content
exclude:
  - main.tex
  - "*.bak"
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
