---
layout: default
---
{% include site-header.html %}

<div class="container container-narrow">
  <article class="note">
    <header class="note-header">
      {% if page.category %}<p class="note-meta"><span class="note-category">{{ page.category }}</span>{% if page.date %} <span class="note-dot">·</span> <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %d, %Y" }}</time>{% endif %}</p>{% endif %}
    </header>
    <div class="note-body">
      {{ content }}
    </div>
  </article>

  {% include footer.html %}
</div>
