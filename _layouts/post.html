<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | Jiwon Jeong</title>
  <meta name="description" content="{{ page.description | default: page.title }}">
  <meta name="author" content="Jiwon Jeong">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: page.title }}">
  <meta property="og:url" content="https://jw9603.github.io{{ page.url }}">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="container">

    <div class="post-nav" style="padding-top: 40px;">
      <a href="/">&larr; Home</a> &nbsp; / &nbsp; <a href="/blog/">All posts</a>
    </div>

    <article class="post" style="padding-top: 30px;">
      <header class="post-header">
        <h1 style="margin-bottom: 6px;">{{ page.title }}</h1>
        <p style="color: #888; font-size: 1.4rem;">{{ page.date | date: "%b %-d, %Y" }}</p>
      </header>

      <div class="post-content">
        {{ content }}
      </div>
    </article>

    <footer class="site-footer" style="margin-top: 60px;">
      <p>&copy; {{ "now" | date: "%Y" }} Jiwon Jeong</p>
    </footer>

  </div>

  <script data-goatcounter="https://jw9603.goatcounter.com/count"
    async src="//gc.zgo.at/count.js"></script>
</body>
</html>
